<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BLOG — Thrcot Robotics™</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@400;600&family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="blog.css">
</head>
<body>

<!-- ── HEADER ── -->
<header id="header">

  <!-- Twitterカードの種類（大きな画像を表示する場合） -->
  <meta name="twitter:card" content="summary_large_image" />
  <!-- 表示したいタイトル -->
  <meta name="twitter:title" content="Thrcot Robotics™" />
  <!-- 表示したい説明文 -->
  <meta name="twitter:description" content="Thrcot Robotics™" />
  <!-- 表示したい画像のURL（絶対パスで指定） -->
  <meta name="twitter:image" content="images/hero.jpg" />

  <a class="logo-area" href="#">
    <img class="logo-img" src="images/logo.png" alt="Thrcot Robotics"
         onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <div style="display:none;">
      <div class="logo-text">Thrcot</div>
      <div class="logo-sub">Robotics™</div>
    </div>
  </a>

  <button class="nav-toggle" id="navToggle" aria-label="メニューを開く">
    <span></span><span></span><span></span>
  </button>

  <nav id="globalNav">
    <a href="#about">ABOUT</a>
    <a href="#robots">ROBOTS</a>
    <a href="#sponsors">SPONSORS</a>
    <a href="#links">LINKS</a>
    <a href="blog.html">BLOG</a>
  </nav>
</header>


<!-- ── BLOG HERO ── -->
<div class="blog-hero">
  <div class="blog-hero-inner">
    <p class="hero-eyebrow">THRCOT ROBOTICS™</p>
    <h1 class="blog-hero-title">BLOG</h1>
    <p class="blog-hero-sub">活動記録・開発日誌・技術資料</p>
  </div>
</div>

<!-- ── メインコンテンツ ── -->
<main class="blog-main" id="blogMain">

  <!-- 一覧ビュー -->
  <div id="listView">
    <div class="blog-toolbar">
      <!-- カテゴリフィルター -->
      <div class="blog-filter" id="filterBar">
        <button class="filter-btn active" data-cat="all">ALL</button>
        <!-- カテゴリは動的に追加 -->
      </div>
      <!-- 右側：件数 + 並べ替え -->
      <div class="blog-toolbar-right">
        <div class="blog-count" id="postCount"></div>
        <div class="sort-controls">
          <select class="sort-select" id="sortKey">
            <option value="date">日付</option>
            <option value="likes">いいね数</option>
            <option value="views">閲覧数</option>
          </select>
          <button class="sort-dir-btn" id="sortDir" data-dir="desc" title="降順">↓</button>
        </div>
      </div>
    </div>
    <div class="blog-grid" id="blogGrid">
      <!-- 記事カードは JS で生成 -->
    </div>
  </div>

  <!-- 記事ビュー -->
  <div id="articleView" style="display:none;">
    <div class="article-wrap">
      <button class="back-btn" id="backBtn">← BLOG に戻る</button>
      <div class="article-meta" id="articleMeta"></div>
      <div class="article-body" id="articleBody"></div>
      <!-- いいね・シェア・閲覧数バー -->
      <div class="article-actions" id="articleActions"></div>
      <div class="article-nav" id="articleNav"></div>
    </div>
  </div>

</main>

<!-- ── FOOTER ── -->
<footer class="site-footer">
  <div class="footer-inner">
    <div>
      <div class="footer-team">THRCOT ROBOTICS™</div>
      <div class="footer-sub">創考機巧製作所</div>
    </div>
    <div class="footer-copy">
      © 2026 Thrcot Robotics™<br>
      RoboCup Junior Infrared Team<br>
      2023 - 2026
    </div>
  </div>
  <div class="footer-border">
    <div class="footer-nav">
      <a href="#about">ABOUT</a>
      <a href="#robots">ROBOTS</a>
      <a href="#sponsors">SPONSORS</a>
      <a href="#links">LINKS</a>
    </div>
  </div>
  <div class="footer-bg-text">ROBOCUP / JUNIOR / INFRARED / ROBOTICS</div>
</footer>

<!-- marked.js (Markdown→HTML変換) CDN -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="script.js"></script>
<script src="blog.js"></script>
</body>
</html>
