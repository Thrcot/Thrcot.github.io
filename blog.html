<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BLOG — Thrcot Robotics™</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@400;600&family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="blog.css">
</head>
<body>

<!-- ── HEADER（共通） ── -->
<header id="header">
  <a class="logo-area" href="index.html">
    <img class="logo-img" src="images/logo.png" alt="Thrcot Robotics"
         onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <div style="display:none;">
      <div class="logo-text">Thrcot</div>
      <div class="logo-sub">Robotics™</div>
    </div>
  </a>
  <button class="nav-toggle" id="navToggle" aria-label="メニューを開く">
    <span></span><span></span><span></span>
  </button>
  <nav id="globalNav">
    <a href="index.html#about">ABOUT</a>
    <a href="index.html#robots">ROBOTS</a>
    <a href="index.html#sponsors">SPONSORS</a>
    <a href="index.html#links">LINKS</a>
    <a href="blog.html" class="nav-active">BLOG</a>
  </nav>
</header>

<!-- ── BLOG HERO ── -->
<div class="blog-hero">
  <div class="blog-hero-inner">
    <p class="hero-eyebrow">THRCOT ROBOTICS™</p>
    <h1 class="blog-hero-title">BLOG</h1>
    <p class="blog-hero-sub">活動記録・開発日誌・大会レポート</p>
  </div>
</div>

<!-- ── メインコンテンツ ── -->
<main class="blog-main" id="blogMain">

  <!-- 一覧ビュー -->
  <div id="listView">
    <div class="blog-toolbar">
      <div class="blog-filter" id="filterBar">
        <button class="filter-btn active" data-cat="all">ALL</button>
        <!-- カテゴリは動的に追加 -->
      </div>
      <div class="blog-count" id="postCount"></div>
    </div>
    <div class="blog-grid" id="blogGrid">
      <!-- 記事カードは JS で生成 -->
    </div>
  </div>

  <!-- 記事ビュー -->
  <div id="articleView" style="display:none;">
    <div class="article-wrap">
      <button class="back-btn" id="backBtn">← BLOG に戻る</button>
      <div class="article-meta" id="articleMeta"></div>
      <div class="article-body" id="articleBody"></div>
      <div class="article-nav" id="articleNav"></div>
    </div>
  </div>

</main>

<!-- ── FOOTER（共通） ── -->
<footer class="site-footer">
  <div class="footer-inner">
    <div>
      <div class="footer-team">THRCOT ROBOTICS™</div>
      <div class="footer-sub">創考機巧製作所</div>
    </div>
    <div class="footer-copy">
      © 2026 Thrcot Robotics™<br>
      RoboCup Junior Infrared Team
    </div>
  </div>
  <div class="footer-border">
    <div class="footer-nav">
      <a href="index.html#about">ABOUT</a>
      <a href="index.html#robots">ROBOTS</a>
      <a href="index.html#sponsors">SPONSORS</a>
      <a href="index.html#links">LINKS</a>
      <a href="blog.html">BLOG</a>
    </div>
  </div>
  <div class="footer-bg-text">ROBOCUP / JUNIOR / INFRARED / ROBOTICS</div>
</footer>

<!-- marked.js (Markdown→HTML変換) CDN -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="script.js"></script>
<script src="blog.js"></script>
</body>
</html>
